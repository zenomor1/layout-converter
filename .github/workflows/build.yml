name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyperclip keyboard
    
    - name: Build Simple Version
      run: |
        pyinstaller --onefile --windowed --name "LayoutConverter" layout_converter.py
    
    - name: Build Advanced Version (PRO)
      run: |
        pyinstaller --onefile --windowed --name "LayoutConverterPRO" layout_converter_advanced.py
    
    - name: Build Tray Version v2 (Auto-replace with settings)
      run: |
        pyinstaller --onefile --windowed --name "LayoutConverterTRAY" layout_converter_tray_v2.py
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: layout-converter-all
        path: dist/*.exe
        retention-days: 30
